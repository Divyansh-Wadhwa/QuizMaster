services:
  - type: web
    name: quiz-result-service
    runtime: docker
    plan: free
    dockerfilePath: ./Dockerfile
    envVars:
      - key: PORT
        value: 8082
      - key: SPRING_DATA_MONGODB_URI
        sync: false
    healthCheck:
      path: /actuator/health
      initialDelaySeconds: 30
      periodSeconds: 10
